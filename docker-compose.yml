services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: brewery_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - brewery_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: brewery_api
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_HOST: db # DB_HOST=db (to onoma tou service). Mesa sto Docker network to "localhost"
                  # tha simaine to idio to container, oxi to container tis basis.
    ports:
      - "8000:8000"
    volumes:
      - ./src/brewery_twin/static:/app/src/brewery_twin/static
    depends_on:
      db:
        condition: service_healthy

  simulator:
    build: .
    container_name: brewery_simulator
    restart: unless-stopped
    environment:
      API_URL: http://api:8000/measurements
    command: ["python", "scripts/simulator.py"]
    depends_on:
      - api

volumes:
  brewery_pgdata: